<!DOCTYPE html>
<html lang="it">
<head>
    <!-- [Previous head content unchanged] -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mint Journal - Personal Cocktail Journal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="manifest" href="data:application/manifest+json,{
        \"name\": \"Mint Journal\",
        \"short_name\": \"MintJournal\",
        \"icons\": [
            {\"src\": \"data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTkyIiBoZWlnaHQ9IjE5MiIgdmlld0JveD0iMCAwIDE5MiAxOTIiIGZpbGw9Im5vbmUiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+CjxjaXJjbGUgY3g9Ijk2IiBjeT0iOTYiIHI9Ijk2IiBmaWxsPSIjODU5OTZlIi8+CjxwYXRoIGQ9Ik0xMjAgMTI0QzEyMCAxMzEuMjM5IDExMi4yMzkgMTM5IDk5LjIwMDMgMTM5SDkyLjc5OTdDODAuNzYwMSAxMzkgNzMgMTMxLjIzOSA3MyAxMjRDNzMgMTE2Ljc2MSA4MC43NjAxIDEwOSAxMTYuMjAxIDEwOUwxMjAgMTA5WiIgZmlsbD0id2hpdGUiLz4KPHBhdGggZD0iTTkzIDEwNUM5MyA5Mi43NjE0IDkwLjIzOTcgODUgODMgODVINzZDNzMuNzYwMyA4NSA3MSAxOTEuNzYxIDcxIDk4SDkySDkzWiIgZmlsbD0id2hpdGUiLz4KPC9zdmc+\", \"sizes\": \"192x192\", \"type\": \"image/svg+xml\"}
        ],
        \"theme_color\": \"#85996e\",
        \"background_color\": \"#f5f7fa\",
        \"display\": \"standalone\"
    }">
    <style>
        /* CSS Variables per Dark Mode */
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --container-bg: rgba(255, 255, 255, 0.95);
            --text-primary: #1a1a1a;
            --text-secondary: #666;
            --card-bg: white;
            --border-color: #e9ecef;
            --header-bg: linear-gradient(135deg, #a8b5a2 0%, #85996e 100%);
            --header-text: white;
            --accent: #85996e;
            --input-bg: white;
            --input-border: #e9ecef;
            --success-bg: #e8f5e8;
            --shadow: rgba(0,0,0,0.15);
        }

        [data-theme="dark"] {
            --bg-gradient: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 100%);
            --container-bg: rgba(20, 20, 30, 0.95);
            --text-primary: #e8e8f0;
            --text-secondary: #a0a0b0;
            --card-bg: rgba(30, 30, 45, 0.8);
            --border-color: #2a2a40;
            --header-bg: linear-gradient(135deg, #2d3748 0%, #4a5568 100%);
            --header-text: #f7fafc;
            --accent: #68d391;
            --input-bg: #2d3748;
            --input-border: #4a5568;
            --success-bg: rgba(102, 126, 234, 0.2);
            --shadow: rgba(0,0,0,0.4);
        }

        /* [Previous CSS unchanged fino a .overlay] */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            padding: 20px;
            color: var(--text-primary);
            transition: background 0.3s ease;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: var(--container-bg);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: 0 25px 50px var(--shadow);
            overflow: hidden;
        }

        .header {
            background: var(--header-bg);
            color: var(--header-text);
            padding: 24px;
            text-align: center;
            position: relative;
        }

        /* Dark Mode Toggle */
        .theme-toggle {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.2);
            color: var(--header-text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-50%) scale(1.05);
        }

        .theme-toggle svg {
            width: 20px;
            height: 20px;
            transition: transform 0.3s ease;
        }

        [data-theme="dark"] .theme-toggle svg.sun {
            display: none;
        }

        [data-theme="light"] .theme-toggle svg.moon {
            display: none;
        }

        .status {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            opacity: 0.9;
            margin-top: 12px;
        }

        /* [Resto CSS invariato ma con variabili] */
        .tab { background: rgba(248,249,250,0.7); color: var(--text-secondary); }
        .tab.active { background: var(--card-bg); color: var(--accent); }
        .cocktail-card { background: var(--card-bg); border-color: var(--border-color); }
        .form-input, .form-textarea { 
            background: var(--input-bg); 
            border-color: var(--input-border);
            color: var(--text-primary);
        }
        .search-input { background: var(--input-bg); border-color: var(--input-border); }
        .tweak-badge { background: var(--success-bg); }

        /* Shake Timer */
        .shake-timer {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--input-bg);
            border: 2px solid var(--input-border);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .timer-display {
            font-size: 24px;
            font-weight: 600;
            min-width: 60px;
            color: var(--accent);
        }

        .timer-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .timer-start { background: #48bb78; color: white; }
        .timer-stop { background: #f56565; color: white; }
        .timer-reset { background: var(--input-bg); color: var(--accent); border: 2px solid var(--input-border); }

        /* Confetti */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            pointer-events: none;
            z-index: 10000;
            animation: confetti-fall 3s linear infinite;
        }

        @keyframes confetti-fall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        /* [Resto animazioni precedenti] */
        @media (max-width: 480px) {
            body { padding: 12px; }
            .container { border-radius: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Mint Journal</h1>
            <button class="theme-toggle" title="Cambia tema" id="themeToggle">
                <svg class="sun" viewBox="0 0 24 24" fill="currentColor">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                    <line x1="18.36" y1="19.36" x2="19.78" y2="18.36"/>
                    <line x1="1" y1="12" x2="3" y2="12"/>
                    <line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.36" x2="5.64" y2="18.36"/>
                    <line x1="18.36" y1="4.22" x2="19.78" y2="5.64"/>
                </svg>
                <svg class="moon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
            </button>
            <div class="status">
                <span id="connectionStatus">📸 Offline</span>
                <span id="currentCategory">💚 Categoria</span>
            </div>
        </div>

        <!-- [Tabs e resto HTML invariato] -->
        <div class="tabs">
            <div class="tab active" data-tab="journal">Journal</div>
            <div class="tab" data-tab="stats">Stats</div>
        </div>

        <div class="content">
            <!-- [Search invariato] -->
            <div class="search-box">
                <svg class="search-icon" viewBox="0 0 24 24" fill="currentColor">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="M21 21l-4.35-4.35"></path>
                </svg>
                <input type="text" class="search-input" placeholder="Cerca un drink...">
            </div>

            <button class="add-btn">+ Nuovo drink</button>
            <div class="cocktail-grid" id="cocktailGrid"></div>
        </div>
    </div>

    <!-- [Modal invariato] -->
    <div class="overlay" id="modalOverlay">
        <div class="modal" id="modalContent"></div>
    </div>

    <script>
        class MintJournal {
            constructor() {
                this.cocktails = JSON.parse(localStorage.getItem('mintJournal')) || [];
                this.currentTab = 'journal';
                this.shakeTimer = null;
                this.shakeStartTime = 0;
                this.init();
            }

            init() {
                this.initTheme();
                this.bindEvents();
                this.render();
                this.animateCards();
                this.updateConnectionStatus();
            }

            initTheme() {
                const savedTheme = localStorage.getItem('theme') || 
                    (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme', savedTheme);
            }

            bindEvents() {
                // [Eventi precedenti invariati]
                document.querySelectorAll('.tab').forEach(tab => {
                    tab.addEventListener('click', (e) => {
                        document.querySelector('.tab.active').classList.remove('active');
                        tab.classList.add('active');
                        this.currentTab = tab.dataset.tab;
                        this.render();
                    });
                });

                document.querySelector('.search-input').addEventListener('input', (e) => {
                    this.render(e.target.value);
                });

                document.querySelector('.add-btn').addEventListener('click', () => {
                    this.showAddModal();
                });

                document.getElementById('modalOverlay').addEventListener('click', (e) => {
                    if (e.target.id === 'modalOverlay') this.hideModal();
                });

                // Dark Mode Toggle
                document.getElementById('themeToggle').addEventListener('click', () => {
                    const current = document.documentElement.getAttribute('data-theme');
                    const next = current === 'dark' ? 'light' : 'dark';
                    document.documentElement.setAttribute('data-theme', next);
                    localStorage.setItem('theme', next);
                    
                    if ('vibrate' in navigator) {
                        navigator.vibrate(50); // Haptic feedback
                    }
                });

                // System theme changes
                window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
                    if (!localStorage.getItem('theme')) {
                        document.documentElement.setAttribute('data-theme', e.matches ? 'dark' : 'light');
                    }
                });

                // PWA Install
                window.addEventListener('beforeinstallprompt', (e) => {
                    e.preventDefault();
                    localStorage.setItem('pwaPrompted', 'true');
                });
            }

            updateConnectionStatus() {
                const status = navigator.onLine ? '🟢 Online' : '📸 Offline';
                document.getElementById('connectionStatus').textContent = status;
            }

            showAddModal() {
                const modal = document.getElementById('modalContent');
                modal.innerHTML = this.getAddFormHTML();
                document.getElementById('modalOverlay').classList.add('show');
                this.bindFormEvents();
            }

            getAddFormHTML() {
                return `
                    <div style="padding: 32px 24px 24px;">
                        <h2 style="font-size: 24px; font-weight: 600; margin-bottom: 24px; color: var(--text-primary);">Nuovo Drink</h2>
                        
                        <!-- Shake Timer -->
                        <div class="shake-timer">
                            <div class="timer-display" id="shakeTimer">00:00</div>
                            <button class="timer-btn timer-start" id="shakeStart">Start</button>
                            <button class="timer-btn timer-stop" id="shakeStop" style="display:none;">Stop</button>
                            <button class="timer-btn timer-reset" id="shakeReset">Reset</button>
                        </div>

                        <form id="cocktailForm">
                            <div class="form-group">
                                <label class="form-label">Nome drink</label>
                                <input type="text" class="form-input" name="name" required>
                            </div>
                            
                            <div class="form-group">
                                <label class="form-label">Categoria</label>
                                <input type="text" class="form-input" name="category" placeholder="es. Negroni-like">
                            </div>
                            
                            <div class="form-group">
                                <label class="form-label">Foto</label>
                                <div class="photo-upload">📸<br><br>Trascina foto o clicca<br>Max 5MB</div>
                                <input type="file" id="photoInput" accept="image/*" style="display: none;">
                            </div>
                            
                            <div class="form-group">
                                <label class="form-label">Rating</label>
                                <div class="rating-stars" id="ratingStars">
                                    ${'<svg class="star" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>'.repeat(5)}
                                </div>
                                <input type="hidden" name="rating" value="0">
                            </div>
                            
                            <div class="form-group">
                                <label class="form-label">Tweaks (modifiche + shake time)</label>
                                <textarea class="form-textarea" name="notes" rows="4" placeholder="es. +10ml Campari, -5ml vermouth, shakerato 12s..." id="notesTextarea"></textarea>
                            </div>
                            
                            <div style="display: flex; gap: 12px;">
                                <button type="submit" style="flex: 1; padding: 16px; background: var(--accent); color: white; border: none; border-radius: 16px; font-weight: 600;">Salva</button>
                                <button type="button" id="cancelBtn" style="flex: 1; padding: 16px; background: var(--input-bg); border: 2px solid var(--input-border); border-radius: 16px; font-weight: 600; color: var(--text-primary);">Cancella</button>
                            </div>
                        </form>
                    </div>
                `;
            }

            bindFormEvents() {
                // [Eventi precedenti + nuovi]
                const form = document.getElementById('cocktailForm');
                const photoInput = document.getElementById('photoInput');
                const uploadArea = document.querySelector('.photo-upload');
                const stars = document.querySelectorAll('#ratingStars .star');
                const ratingInput = document.querySelector('input[name="rating"]');

                // Shake Timer Events
                document.getElementById('shakeStart').addEventListener('click', () => this.startShakeTimer());
                document.getElementById('shakeStop').addEventListener('click', () => this.stopShakeTimer());
                document.getElementById('shakeReset').addEventListener('click', () => this.resetShakeTimer());

                // [Resto eventi precedenti]
                uploadArea.addEventListener('click', () => photoInput.click());
                photoInput.addEventListener('change', (e) => this.handleImageUpload(e.target.files[0]));
                
                stars.forEach((star, index) => {
                    star.addEventListener('click', () => {
                        const rating = index + 1;
                        ratingInput.value = rating;
                        stars.forEach((s, i) => s.classList.toggle('filled', i < rating));
                    });
                });

                form.addEventListener('submit', (e) => {
                    e.preventDefault();
                    const formData = new FormData(form);
                    const notes = formData.get('notes') || '';
                    const shakeTime = this.formatShakeTime();
                    const finalNotes = shakeTime ? `${notes ? notes + '\n' : ''}⏱️ Shake time: ${shakeTime}` : notes;
                    
                    formData.set('notes', finalNotes);
                    this.saveCocktail(formData);
                });

                document.getElementById('cancelBtn').addEventListener('click', () => this.hideModal());
            }

            // Shake Timer Methods
            startShakeTimer() {
                this.shakeStartTime = Date.now();
                this.shakeTimer = setInterval(() => this.updateShakeTimer(), 100);
                document.getElementById('shakeStart').style.display = 'none';
                document.getElementById('shakeStop').style.display = 'inline-flex';
                if ('vibrate' in navigator) navigator.vibrate([100, 50, 100]);
            }

            stopShakeTimer() {
                clearInterval(this.shakeTimer);
                this.shakeTimer = null;
                document.getElementById('shakeStart').style.display = 'inline-flex';
                document.getElementById('shakeStop').style.display = 'none';
                if ('vibrate' in navigator) navigator.vibrate(200);
            }

            resetShakeTimer() {
                this.stopShakeTimer();
                document.getElementById('shakeTimer').textContent = '00:00';
                this.shakeStartTime = 0;
            }

            updateShakeTimer() {
                if (this.shakeStartTime) {
                    const elapsed = Date.now() - this.shakeStartTime;
                    const seconds = Math.floor(elapsed / 1000);
                    const ms = Math.floor((elapsed % 1000) / 10);
                    document.getElementById('shakeTimer').textContent = 
                        `${seconds.toString().padStart(2, '0')}:${ms.toString().padStart(2, '0')}`;
                }
            }

            formatShakeTime() {
                if (this.shakeStartTime && !this.shakeTimer) {
                    const elapsed = Math.floor((Date.now() - this.shakeStartTime) / 1000);
                    return `${elapsed}s`;
                }
                return '';
            }

            saveCocktail(formData) {
                const cocktail = {
                    id: Date.now().toString(),
                    name: formData.get('name'),
                    category: formData.get('category') || '',
                    rating: parseInt(formData.get('rating')),
                    notes: formData.get('notes'),
                    tweaks: (formData.get('notes') || '').split(',').filter(t => t.trim()).length,
                    date: new Date().toISOString(),
                    image: ''
                };

                this.cocktails.unshift(cocktail);
                localStorage.setItem('mintJournal', JSON.stringify(this.cocktails));
                
                // Confetti + Haptics per rating alto
                if (cocktail.rating >= 4) {
                    this.triggerConfetti();
                    if ('vibrate' in navigator) {
                        navigator.vibrate([100, 30, 100, 30, 100]);
                    }
                }
                
                this.hideModal();
                this.render();
            }

            triggerConfetti() {
                const colors = ['#68d391', '#48bb78', '#38a169', '#2f855a', '#22543d'];
                for (let i = 0; i < 50; i++) {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animationDelay = Math.random() * 0.5 + 's';
                    confetti.style.animationDuration = (Math.random() * 1 + 2) + 's';
                    document.body.appendChild(confetti);
                    
                    setTimeout(() => confetti.remove(), 4000);
                }
            }

            // [Altri metodi precedenti invariati: render, renderStats, etc.]
            render(searchTerm = '') {
                const container = document.getElementById('cocktailGrid');
                
                if (this.currentTab === 'stats') {
                    container.innerHTML = this.renderStats();
                    return;
                }

                const filtered = this.cocktails
                    .filter(c => 
                        !searchTerm || 
                        c.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                        c.notes.toLowerCase().includes(searchTerm.toLowerCase())
                    )
                    .sort((a, b) => new Date(b.date) - new Date(a.date));

                container.innerHTML = filtered.map((cocktail, index) => `
                    <div class="cocktail-card" data-id="${cocktail.id}">
                        <div class="cocktail-image" style="background-image: ${cocktail.image ? `url(${cocktail.image})` : ''}">
                            ${cocktail.image ? '' : '📸 No photo'}
                        </div>
                        <div class="cocktail-name">${cocktail.name}</div>
                        <div class="cocktail-meta">
                            <div class="rating">${'★'.repeat(cocktail.rating)}${'☆'.repeat(5 - cocktail.rating)}</div>
                            <span class="tweak-badge">${cocktail.tweaks} tweaks</span>
                        </div>
                        <div style="color: var(--text-secondary); font-size: 14px;">${new Date(cocktail.date).toLocaleDateString('it-IT')}</div>
                    </div>
                `).join('');

                document.querySelectorAll('.cocktail-card').forEach(card => {
                    card.addEventListener('click', () => {
                        const id = card.dataset.id;
                        this.showCocktailModal(id);
                    });
                });

                this.animateCards();
            }

            hideModal() {
                document.getElementById('modalOverlay').classList.remove('show');
                this.resetShakeTimer();
            }

            // [Altri metodi come showCocktailModal, deleteCocktail etc. invariati]
        }

        // Init app + Connection status
        const journal = new MintJournal();
        window.journal = journal;

        window.addEventListener('online', () => journal.updateConnectionStatus());
        window.addEventListener('offline', () => journal.updateConnectionStatus());
    </script>
</body>
</html>

        }

        const journal = new MintJournal();
        window.journal = journal;
    </script>
</body>
