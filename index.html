<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mint Journal - Personal Cocktail Journal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="manifest" href="data:application/manifest+json,{
        \"name\": \"Mint Journal\",
        \"short_name\": \"MintJournal\",
        \"icons\": [
            {\"src\": \"data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTkyIiBoZWlnaHQ9IjE5MiIgdmlld0JveD0iMCAwIDE5MiAxOTIiIGZpbGw9Im5vbmUiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+CjxjaXJjbGUgY3g9Ijk2IiBjeT0iOTYiIHI9Ijk2IiBmaWxsPSIjODU5OTZlIi8+CjxwYXRoIGQ9Ik0xMjAgMTI0QzEyMCAxMzEuMjM5IDExMi4yMzkgMTM5IDk5LjIwMDMgMTM5SDkyLjc5OTdDODAuNzYwMSAxMzkgNzMgMTMxLjIzOSA3MyAxMjRDNzMgMTE2Ljc2MSA4MC43NjAxIDEwOSAxMTYuMjAxIDEwOUwxMjAgMTA5WiIgZmlsbD0id2hpdGUiLz4KPHBhdGggZD0iTTkzIDEwNUM5MyA5Mi43NjE0IDkwLjIzOTcgODUgODMgODVINzZDNzMuNzYwMyA4NSA3MSAxOTEuNzYxIDcxIDk4SDkySDkzWiIgZmlsbD0id2hpdGUiLz4KPC9zdmc+\", \"sizes\": \"192x192\", \"type\": \"image/svg+xml\"}
        ],
        \"theme_color\": \"#85996e\",
        \"background_color\": \"#f5f7fa\",
        \"display\": \"standalone\"
    }">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --container-bg: rgba(255, 255, 255, 0.95);
            --text-primary: #1a1a1a;
            --text-secondary: #666;
            --card-bg: white;
            --border-color: #e9ecef;
            --header-bg: linear-gradient(135deg, #a8b5a2 0%, #85996e 100%);
            --header-text: white;
            --accent: #85996e;
            --input-bg: white;
            --input-border: #e9ecef;
            --success-bg: #e8f5e8;
            --shadow: rgba(0,0,0,0.15);
        }

        [data-theme="dark"] {
            --bg-gradient: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 100%);
            --container-bg: rgba(20, 20, 30, 0.95);
            --text-primary: #e8e8f0;
            --text-secondary: #a0a0b0;
            --card-bg: rgba(30, 30, 45, 0.8);
            --border-color: #2a2a40;
            --header-bg: linear-gradient(135deg, #2d3748 0%, #4a5568 100%);
            --header-text: #f7fafc;
            --accent: #68d391;
            --input-bg: #2d3748;
            --input-border: #4a5568;
            --success-bg: rgba(102, 126, 234, 0.2);
            --shadow: rgba(0,0,0,0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-gradient); min-height: 100vh; padding: 20px; color: var(--text-primary); }
        .container { max-width: 500px; margin: 0 auto; background: var(--container-bg); backdrop-filter: blur(20px); border-radius: 24px; box-shadow: 0 25px 50px var(--shadow); overflow: hidden; }
        .header { background: var(--header-bg); color: var(--header-text); padding: 24px; text-align: center; position: relative; }
        .theme-toggle { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); width: 48px; height: 48px; border-radius: 50%; border: none; background: rgba(255,255,255,0.2); color: var(--header-text); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; }
        .theme-toggle:hover { background: rgba(255,255,255,0.3); transform: translateY(-50%) scale(1.05); }
        .status { display: flex; justify-content: space-between; font-size: 14px; opacity: 0.9; margin-top: 12px; }
        .tabs { display: flex; background: var(--card-bg); border-bottom: 1px solid var(--border-color); }
        .tab { flex: 1; padding: 16px 20px; text-align: center; cursor: pointer; font-weight: 500; transition: all 0.2s ease; color: var(--text-secondary); }
        .tab.active { background: var(--accent); color: white; }
        .content { padding: 24px; min-height: 400px; }
        .search-box { position: relative; margin-bottom: 20px; }
        .search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); width: 20px; height: 20px; color: var(--text-secondary); }
        .search-input { width: 100%; padding: 16px 16px 16px 48px; border: 2px solid var(--input-border); border-radius: 16px; background: var(--input-bg); color: var(--text-primary); font-size: 16px; }
        .search-input:focus { outline: none; border-color: var(--accent); }
        .add-btn { width: 100%; padding: 16px; background: var(--accent); color: white; border: none; border-radius: 16px; font-size: 16px; font-weight: 600; cursor: pointer; margin-bottom: 24px; }
        .add-btn:hover { background: #6b8a54; transform: translateY(-1px); }
        .cocktail-grid { display: grid; gap: 20px; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
        .cocktail-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 20px; padding: 16px; cursor: pointer; transition: all 0.3s ease; }
        .cocktail-card:hover { transform: translateY(-4px); box-shadow: 0 20px 40px var(--shadow); border-color: var(--accent); }
        .cocktail-image { width: 100%; height: 120px; border-radius: 16px; background: #f8f9fa; display: flex; align-items: center; justify-content: center; font-size: 48px; margin-bottom: 12px; }
        .cocktail-name { font-weight: 600; font-size: 16px; margin-bottom: 8px; color: var(--text-primary); }
        .cocktail-meta { display:  flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .rating { color: #fbbf24; font-size: 14px; }
        .tweak-badge { background: var(--success-bg); color: #065f46; padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .overlay.show { display: flex; }
        .modal { background: var(--container-bg); border-radius: 24px; max-width: 90vw; max-height: 90vh; overflow-y: auto; width: 500px; }
        .form-group { margin-bottom: 24px; }
        .form-label { display: block; font-weight: 500; margin-bottom: 8px; color: var(--text-primary); font-size: 14px; }
        .form-input, .form-textarea { width: 100%; padding: 16px; border: 2px solid var(--input-border); border-radius: 16px; background: var(--input-bg); color: var(--text-primary); font-size: 16px; }
        .form-input:focus, .form-textarea:focus { outline: none; border-color: var(--accent); }
        .form-textarea { resize: vertical; min-height: 120px; }
        .rating-stars { display: flex; gap: 4px; margin-bottom: 8px; }
        .star { width: 28px; height: 28px; cursor: pointer; opacity: 0.4; fill: currentColor; transition: all 0.2s ease; }
        .star.filled { opacity: 1; fill: #fbbf24; }
        .modal-buttons { display: flex; gap: 12px; }
        .btn-primary { flex: 1; padding: 16px; background: var(--accent); color: white; border: none; border-radius: 16px; font-weight: 600; cursor: pointer; }
        .btn-secondary { flex: 1; padding: 16px; background: var(--input-bg); border: 2px solid var(--input-border); border-radius: 16px; color: var(--text-primary); font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Mint Journal</h1>
            <button class="theme-toggle" id="themeToggle">
                <svg class="sun" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="5"/></svg>
                <svg class="moon" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
            <div class="status">
                <span id="connectionStatus">📸 Offline</span>
                <span id="currentCategory">💚 Categoria</span>
            </div>
        </div>

        <div class="tabs">
            <div class="tab active" data-tab="journal">Journal</div>
            <div class="tab" data-tab="stats">Stats</div>
        </div>

        <div class="content">
            <div class="search-box">
                <svg class="search-icon" viewBox="0 0 24 24" fill="currentColor">
                    <circle cx="11" cy="11" r="8"></circle><path d="M21 21l-4.35-4.35"></path>
                </svg>
                <input type="text" class="search-input" placeholder="Cerca un drink...">
            </div>
            <button class="add-btn">+ Nuovo drink</button>
            <div class="cocktail-grid" id="cocktailGrid"></div>
        </div>
    </div>

    <div class="overlay" id="modalOverlay">
        <div class="modal" id="modalContent"></div>
    </div>

    <script>
        class MintJournal {
            constructor() {
                this.cocktails = JSON.parse(localStorage.getItem('mintJournal')) || [];
                this.currentTab = 'journal';
                this.currentEditingId = null;
                this.init();
            }

            init() {
                this.initTheme();
                this.bindStaticEvents();
                this.render();
            }

            initTheme() {
                const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme', savedTheme);
            }

            bindStaticEvents() {
                // Tabs
                document.querySelectorAll('.tab').forEach(tab => {
                    tab.addEventListener('click', () => {
                        document.querySelector('.tab.active').classList.remove('active');
                        tab.classList.add('active');
                        this.currentTab = tab.dataset.tab;
                        this.render();
                    });
                });

                // Search
                document.querySelector('.search-input').addEventListener('input', (e) => this.render(e.target.value));

                // Add button
                document.querySelector('.add-btn').addEventListener('click', () => {
                    this.currentEditingId = null;
                    this.showAddModal();
                });

                // Theme toggle
                document.getElementById('themeToggle').addEventListener('click', () => {
                    const current = document.documentElement.getAttribute('data-theme');
                    const next = current === 'dark' ? 'light' : 'dark';
                    document.documentElement.setAttribute('data-theme', next);
                    localStorage.setItem('theme', next);
                });

                // Modal overlay
                document.getElementById('modalOverlay').addEventListener('click', (e) => {
                    if (e.target.id === 'modalOverlay') this.hideModal();
                });
            }

            showAddModal() {
                const editingCocktail = this.currentEditingId ? 
                    this.cocktails.find(c => c.id === this.currentEditingId) : null;
                
                document.getElementById('modalContent').innerHTML = this.getEditFormHTML(editingCocktail);
                document.getElementById('modalOverlay').classList.add('show');
                
                // Bind eventi form DOPO aver inserito l'HTML
                setTimeout(() => this.bindFormEvents(editingCocktail), 0);
            }

            getEditFormHTML(cocktail) {
                const isEditing = !!cocktail;
                return `
                    <div style="padding: 32px 24px 24px;">
                        <h2 style="font-size: 24px; font-weight: 600; margin-bottom: 24px;">${isEditing ? `✏️ Modifica ${cocktail.name}` : '🍹 Nuovo Drink'}</h2>
                        <form id="cocktailForm">
                            <input type="hidden" name="id" value="${cocktail?.id || ''}">
                            <div class="form-group">
                                <label class="form-label">Nome drink</label>
                                <input type="text" class="form-input" name="name" value="${cocktail?.name || ''}" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">⏱️ Shake time</label>
                                <input type="text" class="form-input" name="shakeTime" value="${cocktail?.shakeTime || ''}" placeholder="12s">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Categoria</label>
                                <input type="text" class="form-input" name="category" value="${cocktail?.category || ''}">
                            </div>
                            <div class="form-group">
                                <label class="form-label">⭐ Rating</label>
                                <div class="rating-stars" id="ratingStars">
                                    ${'<svg class="star" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>'.repeat(5)}
                                </div>
                                <input type="hidden" name="rating" value="${cocktail?.rating || 0}">
                            </div>
                            <div class="form-group">
                                <label class="form-label">📝 Note (tutto salvato)</label>
                                <textarea class="form-textarea" name="notes">${cocktail?.notes || ''}</textarea>
                            </div>
                            <div class="modal-buttons">
                                <button type="submit" class="btn-primary">${isEditing ? '💾 Aggiorna' : 'Salva'}</button>
                                <button type="button" id="cancelBtn" class="btn-secondary">Annulla</button>
                            </div>
                        </form>
                    </div>
                `;
            }

            bindFormEvents(cocktail) {
                const form = document.getElementById('cocktailForm');
                const stars = document.querySelectorAll('#ratingStars .star');
                const ratingInput = document.querySelector('input[name="rating"]');
                const cancelBtn = document.getElementById('cancelBtn');

                // Inizializza rating stars
                const rating = parseInt(ratingInput.value) || 0;
                stars.forEach((star, i) => star.classList.toggle('filled', i < rating));

                // Rating stars click
                stars.forEach((star, index) => {
                    star.addEventListener('click', () => {
                        const newRating = index + 1;
                        ratingInput.value = newRating;
                        stars.forEach((s, i) => s.classList.toggle('filled', i < newRating));
                    });
                });

                // Form submit
                const handleSubmit = (e) => {
                    e.preventDefault();
                    const formData = new FormData(form);
                    const shakeTime = formData.get('shakeTime')?.trim();
                    let notes = formData.get('notes') || '';
                    
                    if (shakeTime && !notes.includes(shakeTime)) {
                        notes = notes ? `${notes}\n⏱️ Shake time: ${shakeTime}` : `⏱️ Shake time: ${shakeTime}`;
                    }
                    formData.set('notes', notes);
                    this.saveCocktail(formData);
                };

                form.removeEventListener('submit', handleSubmit);
                form.addEventListener('submit', handleSubmit);

                // Cancel button
                if (cancelBtn) {
                    cancelBtn.addEventListener('click', () => this.hideModal());
                }
            }

            saveCocktail(formData) {
                const id = formData.get('id');
                const cocktailData = {
                    id: id || Date.now().toString(),
                    name: formData.get('name'),
                    category: formData.get('category') || '',
                    rating: parseInt(formData.get('rating')) || 0,
                    notes: formData.get('notes'),
                    shakeTime: formData.get('shakeTime') || '',
                    tweaks: (formData.get('notes') || '').split('\n').filter(t => t.trim()).length,
                    date: new Date().toISOString()
                };

                if (id && this.cocktails.find(c => c.id === id)) {
                    const index = this.cocktails.findIndex(c => c.id === id);
                    this.cocktails[index] = { ...this.cocktails[index], ...cocktailData };
                } else {
                    this.cocktails.unshift(cocktailData);
                }

                localStorage.setItem('mintJournal', JSON.stringify(this.cocktails));
                this.hideModal();
                this.render();
                this.currentEditingId = null;
            }

            hideModal() {
                document.getElementById('modalOverlay').classList.remove('show');
            }

            render(searchTerm = '') {
                const container = document.getElementById('cocktailGrid');
                if (this.currentTab === 'stats') {
                    container.innerHTML = '<div style="padding: 40px; text-align: center; color: var(--text-secondary);">📊 Stats in arrivo...</div>';
                    return;
                }

                const filtered = this.cocktails
                    .filter(c => !searchTerm || c.name.toLowerCase().includes(searchTerm.toLowerCase()) || c.notes.toLowerCase().includes(searchTerm.toLowerCase()))
                    .sort((a, b) => new Date(b.date) - new Date(a.date));

                container.innerHTML = filtered.map(cocktail => `
                    <div class="cocktail-card" data-id="${cocktail.id}">
                        <div class="cocktail-image">📸</div>
                        <div class="cocktail-name">${cocktail.name}</div>
                        <div class="cocktail-meta">
                            <div class="rating">${'★'.repeat(cocktail.rating || 0)}${'☆'.repeat(5 - (cocktail.rating || 0))}</div>
                            <span class="tweak-badge">${cocktail.tweaks || 0} tweaks</span>
                        </div>
                        <div style="color: var(--text-secondary); font-size: 14px;">
                            ${new Date(cocktail.date).toLocaleDateString('it-IT')}
                            ${cocktail.shakeTime ? `<br><small>⏱️ ${cocktail.shakeTime}</small>` : ''}
                        </div>
                    </div>
                `).join('');

                // Bind dinamico per le cards
                setTimeout(() => {
                    document.querySelectorAll('.cocktail-card').forEach(card => {
                        // Rimuovi listener precedente
                        const newCard = card.cloneNode(true);
                        card.parentNode.replaceChild(newCard, card);
                        
                        newCard.addEventListener('click', () => {
                            this.currentEditingId = newCard.dataset.id;
                            this.showAddModal();
                        });
                    });
                }, 10);
            }
        }

        // Inizializza l'app
        new MintJournal();
    </script>
</body>
</html>
